services:
  # ============================================
  # PostgreSQL Database (Production)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: academy_postgres_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-academy_music}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    
    # Security: Do NOT expose port to external network
    # Only accessible internally through Docker network
    # ports:
    #   - "${DB_PORT:-5432}:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    
    networks:
      - academy_network
    
    # Resilience: Auto-restart on failure
    restart: unless-stopped
    
    # Health check: Strict validation
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Backend API (Node.js + Express) - Production
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: academy-backend:prod
    container_name: academy_backend_prod
    
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-academy_music}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: ${API_PORT:-3000}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-yourdomain.com}
    
    # Security: Expose only API port internally
    ports:
      - "127.0.0.1:3000:3000"  # Bind to localhost only for internal access
    
    # Resilience: Strict health check dependency
    depends_on:
      postgres:
        condition: service_healthy
    
    # NO volumes in production (immutable containers)
    networks:
      - academy_network
    
    # Resilience: Auto-restart on failure
    restart: unless-stopped
    
    # Health check: Verify API is responding
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
        reservations:
          cpus: '1'
          memory: 512M
    
    # Logging: Centralized logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Frontend (React + Nginx) - Production
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: academy-frontend:prod
    container_name: academy_frontend_prod
    
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://yourdomain.com/api}
    
    # Security: Expose port 80 (standard HTTP)
    # In production, should be behind a reverse proxy (e.g., Traefik, nginx-proxy)
    ports:
      - "80:80"
    
    # Resilience: Depend on healthy backend
    depends_on:
      backend:
        condition: service_healthy
    
    # NO volumes in production (immutable containers)
    networks:
      - academy_network
    
    # Resilience: Auto-restart on failure
    restart: unless-stopped
    
    # Health check: Verify Nginx is responding
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging: Centralized logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# Persistent Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./postgres_data

# ============================================
# Docker Network (Internal)
# ============================================
networks:
  academy_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: academy_bridge
