<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academy Music - Attendance & Billing Management</title>
    <meta name="description" content="Music academy attendance tracking and billing management system" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="robots" content="index, follow" />
    <script>
      try {
        var _t = JSON.parse(localStorage.getItem('academy_theme') || '{}');
        if (_t.primaryColor) {
          (function(hex) {
            var h = hex.replace('#','');
            var r = parseInt(h.slice(0,2),16)/255, g = parseInt(h.slice(2,4),16)/255, b = parseInt(h.slice(4,6),16)/255;
            var mx = Math.max(r,g,b), mn = Math.min(r,g,b), d = mx-mn;
            var hh = 0, ss = 0, ll = (mx+mn)/2;
            if (d > 0) {
              ss = ll > 0.5 ? d/(2-mx-mn) : d/(mx+mn);
              hh = mx===r ? ((g-b)/d+(g<b?6:0))/6 : mx===g ? ((b-r)/d+2)/6 : ((r-g)/d+4)/6;
            }
            hh *= 360; ss *= 100;
            var cfg = [[50,97,.2],[100,93,.3],[200,86,.5],[300,75,.7],[400,62,.85],[500,52,.95],[600,43,1],[700,36,1],[800,28,.9],[900,20,.8]];
            var h2r = function(p,q,t){t<0&&(t+=1);t>1&&(t-=1);return t<1/6?p+(q-p)*6*t:t<.5?q:t<2/3?p+(q-p)*(2/3-t)*6:p;};
            var el = document.documentElement;
            cfg.forEach(function(s) {
              var L=s[1]/100, S=Math.max(.05,Math.min(1,ss/100*s[2]));
              var q2=L<.5?L*(1+S):L+S-L*S, p2=2*L-q2, hf=hh/360;
              el.style.setProperty('--p'+s[0],[Math.round(h2r(p2,q2,hf+1/3)*255),Math.round(h2r(p2,q2,hf)*255),Math.round(h2r(p2,q2,hf-1/3)*255)].join(' '));
            });
            el.style.setProperty('--primary-color', hex);
          })(_t.primaryColor);
        }
        if (_t.secondaryColor) document.documentElement.style.setProperty('--secondary-color', _t.secondaryColor);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
