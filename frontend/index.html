<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academy Music - Attendance & Billing Management</title>
    <meta name="description" content="Music academy attendance tracking and billing management system" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="robots" content="index, follow" />
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('academy_theme') || '{}');
        if (t.primaryColor) document.documentElement.style.setProperty('--primary-color', t.primaryColor);
        if (t.secondaryColor) document.documentElement.style.setProperty('--secondary-color', t.secondaryColor);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
